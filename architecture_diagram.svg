<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3367d6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d8e47;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d33426;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#202124">Архитектура приложения «SmartClass» (MVVM)</text>

  <!-- ==================== PRESENTATION LAYER ==================== -->
  <rect x="30" y="60" width="940" height="195" rx="10" fill="url(#layer1)" opacity="0.08" stroke="#4285f4" stroke-width="1.5"/>
  <rect x="30" y="60" width="940" height="34" rx="10" fill="url(#layer1)"/>
  <text x="500" y="83" text-anchor="middle" font-size="15" font-weight="bold" fill="white">PRESENTATION LAYER (View) — 17 Composable-экранов</text>

  <!-- Row 1: Auth & Entry -->
  <rect x="50" y="105" width="170" height="40" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="135" y="129" text-anchor="middle" font-size="11" fill="#202124">SplashScreen</text>

  <rect x="230" y="105" width="170" height="40" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="315" y="129" text-anchor="middle" font-size="11" fill="#202124">AuthScreen</text>

  <rect x="410" y="105" width="170" height="40" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="495" y="129" text-anchor="middle" font-size="11" fill="#202124">HomeScreen (Student)</text>

  <rect x="590" y="105" width="170" height="40" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="675" y="129" text-anchor="middle" font-size="11" fill="#202124">TeacherHomeScreen</text>

  <rect x="770" y="105" width="180" height="40" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="860" y="129" text-anchor="middle" font-size="11" fill="#202124">AdminScreen</text>

  <!-- Row 2: Student Screens -->
  <rect x="50" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="115" y="176" text-anchor="middle" font-size="10" fill="#202124">TopicsScreen</text>

  <rect x="190" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="255" y="176" text-anchor="middle" font-size="10" fill="#202124">LessonScreen</text>

  <rect x="330" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="176" text-anchor="middle" font-size="10" fill="#202124">PracticeScreen</text>

  <rect x="470" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="535" y="176" text-anchor="middle" font-size="10" fill="#202124">QuizScreen</text>

  <rect x="610" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="675" y="176" text-anchor="middle" font-size="10" fill="#202124">FormulaScreen</text>

  <rect x="750" y="155" width="130" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="176" text-anchor="middle" font-size="10" fill="#202124">ProgressScreen</text>

  <rect x="890" y="155" width="80" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="930" y="176" text-anchor="middle" font-size="10" fill="#202124">Profile</text>

  <!-- Row 3: Student Homework + Teacher Screens -->
  <rect x="50" y="200" width="160" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="221" text-anchor="middle" font-size="10" fill="#202124">HomeworkListScreen</text>

  <rect x="220" y="200" width="160" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="221" text-anchor="middle" font-size="10" fill="#202124">StudentTestScreen</text>

  <rect x="390" y="200" width="170" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="475" y="221" text-anchor="middle" font-size="10" fill="#202124">CreateHomeworkScreen</text>

  <rect x="570" y="200" width="160" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="221" text-anchor="middle" font-size="10" fill="#202124">StudentsListScreen</text>

  <rect x="740" y="200" width="170" height="35" rx="6" fill="white" stroke="#4285f4" stroke-width="1" filter="url(#shadow)"/>
  <text x="825" y="221" text-anchor="middle" font-size="10" fill="#202124">TeacherReportsScreen</text>

  <!-- Navigation component -->
  <rect x="50" y="248" width="920" height="0" rx="0" fill="none"/>
  <rect x="400" y="248" width="200" height="0" rx="0" fill="none"/>

  <!-- ==================== BUSINESS LOGIC LAYER ==================== -->
  <rect x="30" y="285" width="940" height="155" rx="10" fill="url(#layer2)" opacity="0.08" stroke="#34a853" stroke-width="1.5"/>
  <rect x="30" y="285" width="940" height="34" rx="10" fill="url(#layer2)"/>
  <text x="500" y="308" text-anchor="middle" font-size="15" font-weight="bold" fill="white">BUSINESS LOGIC LAYER (ViewModel) — 4 ViewModel</text>

  <rect x="80" y="335" width="210" height="85" rx="8" fill="white" stroke="#34a853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">AlgebraViewModel</text>
  <text x="185" y="380" text-anchor="middle" font-size="10" fill="#5f6368">Состояние обучения</text>
  <text x="185" y="396" text-anchor="middle" font-size="10" fill="#5f6368">Выбранный класс, тема</text>
  <text x="185" y="412" text-anchor="middle" font-size="10" fill="#5f6368">SavedStateHandle + SharedPreferences</text>

  <rect x="310" y="335" width="210" height="85" rx="8" fill="white" stroke="#34a853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">AuthViewModel</text>
  <text x="415" y="380" text-anchor="middle" font-size="10" fill="#5f6368">Аутентификация</text>
  <text x="415" y="396" text-anchor="middle" font-size="10" fill="#5f6368">SignIn / SignUp / Reset</text>
  <text x="415" y="412" text-anchor="middle" font-size="10" fill="#5f6368">StateFlow&lt;AuthState&gt;</text>

  <rect x="540" y="335" width="210" height="85" rx="8" fill="white" stroke="#34a853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="645" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">HomeworkViewModel</text>
  <text x="645" y="380" text-anchor="middle" font-size="10" fill="#5f6368">Управление ДЗ</text>
  <text x="645" y="396" text-anchor="middle" font-size="10" fill="#5f6368">Загрузка, создание, отправка</text>
  <text x="645" y="412" text-anchor="middle" font-size="10" fill="#5f6368">Фильтрация по роли</text>

  <rect x="770" y="335" width="180" height="85" rx="8" fill="white" stroke="#34a853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">TeacherViewModel</text>
  <text x="860" y="380" text-anchor="middle" font-size="10" fill="#5f6368">Данные учителя</text>
  <text x="860" y="396" text-anchor="middle" font-size="10" fill="#5f6368">Предметы, ученики, ДЗ</text>
  <text x="860" y="412" text-anchor="middle" font-size="10" fill="#5f6368">addSnapshotListener</text>

  <!-- ==================== DATA LAYER ==================== -->
  <rect x="30" y="470" width="940" height="230" rx="10" fill="url(#layer3)" opacity="0.08" stroke="#ea4335" stroke-width="1.5"/>
  <rect x="30" y="470" width="940" height="34" rx="10" fill="url(#layer3)"/>
  <text x="500" y="493" text-anchor="middle" font-size="15" font-weight="bold" fill="white">DATA LAYER (Model + Repository)</text>

  <!-- Left: Local Data -->
  <rect x="50" y="515" width="430" height="170" rx="8" fill="white" stroke="#ea4335" stroke-width="1" filter="url(#shadow)"/>
  <text x="265" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea4335">Локальные данные (Kotlin)</text>

  <rect x="65" y="555" width="195" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="162" y="574" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">AlgebraTopics.kt</text>
  <text x="162" y="592" text-anchor="middle" font-size="10" fill="#5f6368">19 тем, ~60 уроков, примеры</text>
  <text x="162" y="606" text-anchor="middle" font-size="10" fill="#5f6368">7–9 классы</text>

  <rect x="275" y="555" width="190" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="370" y="574" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">Formulas.kt</text>
  <text x="370" y="592" text-anchor="middle" font-size="10" fill="#5f6368">53 формулы, 15 категорий</text>
  <text x="370" y="606" text-anchor="middle" font-size="10" fill="#5f6368">Уравнения, степени, тригонометрия</text>

  <rect x="65" y="620" width="195" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="162" y="639" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">Questions.kt</text>
  <text x="162" y="657" text-anchor="middle" font-size="10" fill="#5f6368">50 вопросов, 3 уровня сложности</text>
  <text x="162" y="671" text-anchor="middle" font-size="10" fill="#5f6368">EASY / MEDIUM / HARD</text>

  <rect x="275" y="620" width="190" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="370" y="639" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">Модели</text>
  <text x="370" y="657" text-anchor="middle" font-size="10" fill="#5f6368">Homework, QuizQuestion</text>
  <text x="370" y="671" text-anchor="middle" font-size="10" fill="#5f6368">StudentAttempt, TeacherData</text>

  <!-- Right: Firebase -->
  <rect x="500" y="515" width="450" height="170" rx="8" fill="white" stroke="#ea4335" stroke-width="1" filter="url(#shadow)"/>
  <text x="725" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea4335">Firebase (Cloud)</text>

  <rect x="520" y="555" width="195" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="617" y="574" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">Firebase Auth</text>
  <text x="617" y="592" text-anchor="middle" font-size="10" fill="#5f6368">Регистрация / Вход</text>
  <text x="617" y="606" text-anchor="middle" font-size="10" fill="#5f6368">Роль: Student / Teacher / Admin</text>

  <rect x="730" y="555" width="200" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="830" y="574" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">Cloud Firestore</text>
  <text x="830" y="592" text-anchor="middle" font-size="10" fill="#5f6368">users, homeworks, attempts</text>
  <text x="830" y="606" text-anchor="middle" font-size="10" fill="#5f6368">Real-time синхронизация</text>

  <rect x="520" y="620" width="195" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="617" y="639" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">AuthManager.kt</text>
  <text x="617" y="657" text-anchor="middle" font-size="10" fill="#5f6368">Repository авторизации</text>
  <text x="617" y="671" text-anchor="middle" font-size="10" fill="#5f6368">Смена ролей, блокировка</text>

  <rect x="730" y="620" width="200" height="55" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="0.5"/>
  <text x="830" y="639" text-anchor="middle" font-size="11" font-weight="bold" fill="#202124">FirebaseManager.kt</text>
  <text x="830" y="657" text-anchor="middle" font-size="10" fill="#5f6368">Инициализация Firebase</text>
  <text x="830" y="671" text-anchor="middle" font-size="10" fill="#5f6368">Auth, Firestore, Realtime DB</text>

  <!-- ==================== ARROWS ==================== -->
  <!-- Presentation -> Business Logic -->
  <line x1="300" y1="255" x2="300" y2="282" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="255" x2="500" y2="282" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="255" x2="700" y2="282" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Business Logic -> Data -->
  <line x1="300" y1="425" x2="300" y2="467" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="425" x2="500" y2="467" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="425" x2="700" y2="467" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bidirectional label -->
  <rect x="460" y="262" width="80" height="16" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="0.5"/>
  <text x="500" y="274" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">StateFlow</text>

  <rect x="460" y="448" width="80" height="16" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="0.5"/>
  <text x="500" y="460" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">Coroutines</text>
</svg>
